# Netlify configuration for the Solvera AI Next.js app.
# This is a server-rendered / statically-generated Next.js site (NOT a static
# SPA). The official Next.js runtime plugin handles routing, SSG, and any
# server rendering — do not add a "/* -> /index.html" SPA redirect or set the
# publish directory to "public"/"dist", which would break Next routing.

[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # Next.js 16 requires a modern Node runtime.
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
